<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contato</title>
  <link rel="stylesheet" href="contato.css" />
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Lato:wght@300;400&display=swap" rel="stylesheet" />
</head>
<body>

  <div class="overlay"></div>

  <main class="container">
    <div class="form-card">
      <div class="form-header">
        <div class="rune">✦</div>
        <h1>Entre em Contato</h1>
        <p>Envie sua mensagem através das auroras</p>
      </div>

      <form method="POST" action="#" class="form">

        <div class="field">
          <label for="nome">Nome</label>
          <input type="text" id="nome" name="nome" placeholder="Seu nome completo" required />
        </div>

        <div class="field">
          <label for="email">E-mail</label>
          <input type="email" id="email" name="email" placeholder="seu@email.com" required />
        </div>

        <div class="field">
          <label for="assunto">Assunto</label>
          <select id="assunto" name="assunto" required>
            <option value="" disabled selected>Selecione um assunto</option>
            <option value="duvida">Dúvida</option>
            <option value="suporte">Suporte</option>
            <option value="parceria">Parceria</option>
            <option value="outro">Outro</option>
          </select>
        </div>

        <div class="field">
          <label for="mensagem">Mensagem</label>
          <textarea id="mensagem" name="mensagem" rows="5" placeholder="Escreva sua mensagem aqui..." required></textarea>
        </div>

        <button type="submit" class="btn-submit">
          <span>Enviar Mensagem</span>
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
        </button>

      </form>
    </div>
  </main>

</body>
</html>
